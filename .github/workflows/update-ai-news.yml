name: Update AI News

on:
  schedule:
    # 毎日UTC 01:00に実行（JST 10:00）- BIMニュースと1時間ずらす
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  update-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Fetch AI RSS feeds
        run: |
          python .github/scripts/fetch_ai_rss.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/ai-news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ai-news.json
          git commit -m "chore: Update AI news - $(date +'%Y-%m-%d')"
          git push
