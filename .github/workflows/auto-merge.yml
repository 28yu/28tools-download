# Auto Create PR and Auto Merge for Claude Branches
name: Auto Create PR and Auto Merge for Claude Branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR exists
        id: check-pr
        run: |
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --json number --jq 'length')
          echo "pr_exists=$PR_EXISTS" >> $GITHUB_OUTPUT
          if [ "$PR_EXISTS" != "0" ]; then
            PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number')
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        id: create-pr
        if: steps.check-pr.outputs.pr_exists == '0'
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          TITLE="Auto-merge: ${BRANCH_NAME}"

          PR_URL=$(gh pr create \
            --title "${TITLE}" \
            --body "Auto-created PR from branch \`${BRANCH_NAME}\`. This PR will be automatically merged." \
            --base main \
            --head "${BRANCH_NAME}")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Created PR #$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge PR
        run: |
          # PR番号を取得
          if [ -n "${{ steps.create-pr.outputs.pr_number }}" ]; then
            PR_NUMBER="${{ steps.create-pr.outputs.pr_number }}"
          else
            PR_NUMBER="${{ steps.check-pr.outputs.pr_number }}"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found, skipping merge"
            exit 0
          fi

          echo "Merging PR #$PR_NUMBER..."

          # 直接マージ（--autoはブランチ保護ルールが必要なため使用しない）
          gh pr merge "$PR_NUMBER" --merge --delete-branch
          echo "PR #$PR_NUMBER merged successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
