    <script>
    (function() {
        const CATALOG_URL = 'https://28yu.github.io/Revit-Add-ins/features.json';
        let catalogData = null;

        function getCurrentLang() {
            return window.currentLanguage || localStorage.getItem('lang') || 'ja';
        }

        function renderCatalog() {
            if (!catalogData) return;
            const lang = getCurrentLang();
            const { baseUrl, categories, features } = catalogData;
            const container = document.getElementById('feature-catalog');
            container.innerHTML = '';

            for (const catId of Object.keys(categories)) {
                const catFeatures = features.filter(f => f.category === catId);
                if (catFeatures.length === 0) continue;

                const section = document.createElement('section');
                section.className = 'feature-category';

                const heading = document.createElement('h3');
                heading.className = 'feature-category-title';
                heading.textContent = categories[catId][lang] || categories[catId]['ja'];
                section.appendChild(heading);

                const grid = document.createElement('div');
                grid.className = 'feature-grid';

                for (const f of catFeatures) {
                    const card = document.createElement('a');
                    card.className = 'feature-catalog-card';
                    card.href = `manual.html?id=${f.id}`;
                    const name = f.names[lang] || f.names['ja'];
                    const iconUrl = `${baseUrl}/${f.icon}`;
                    card.innerHTML = `
                        <img src="${iconUrl}" alt="${name}" loading="lazy" />
                        <div class="feature-catalog-name">${name}</div>
                        ${f.added_in ? `<span class="feature-new-badge">NEW</span>` : ''}
                    `;
                    grid.appendChild(card);
                }

                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        async function loadCatalog() {
            try {
                const res = await fetch(CATALOG_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                catalogData = await res.json();
                document.getElementById('catalog-loading').style.display = 'none';
                renderCatalog();
            } catch (e) {
                console.error('Failed to load features.json:', e);
                document.getElementById('catalog-loading').style.display = 'none';
                document.getElementById('catalog-error').style.display = 'block';
            }
        }

        // 言語変更時にカタログを再描画（header のlang-option クリックに委譲）
        document.addEventListener('click', function(e) {
            const opt = e.target.closest('.lang-option');
            if (opt && catalogData) {
                // main.js が window.currentLanguage を更新した後に再描画
                setTimeout(renderCatalog, 50);
            }
        });

        loadCatalog();
    })();
    </script>
