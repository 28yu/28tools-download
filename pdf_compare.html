<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 比較ツール</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 32px 24px;
  }

  h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 28px; letter-spacing: 0.03em; }
  .container { max-width: 960px; margin: 0 auto; }

  .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

  .drop-zone {
    border: 1.5px dashed #ccc; border-radius: 10px; padding: 22px 16px;
    text-align: center; cursor: pointer; background: #fff;
    transition: border-color 0.2s, background 0.2s; user-select: none;
  }
  .drop-zone:hover { border-color: #999; background: #fafafa; }
  .drop-zone.dragover { border-color: #555; background: #f0f0f0; border-style: solid; }
  .drop-zone.loaded-blue { border-color: #1a5ca8; border-style: solid; }
  .drop-zone.loaded-red  { border-color: #c0392b; border-style: solid; }

  .drop-label-sub  { font-size: 11px; color: #999; margin-bottom: 5px; }
  .drop-label-main { font-size: 13px; font-weight: 600; color: #555; }
  .drop-label-main.blue { color: #1a5ca8; }
  .drop-label-main.red  { color: #c0392b; }
  .drop-hint { font-size: 11px; color: #bbb; margin-top: 5px; }

  .controls {
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    margin-bottom: 14px; background: #fff;
    border-radius: 10px; padding: 14px 18px; border: 1px solid #e8e8e8;
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: 12px; color: #777; }

  input[type=range] { width: 110px; accent-color: #1a1a1a; }
  input[type=number] {
    width: 52px; padding: 4px 8px; font-size: 13px;
    border: 1px solid #ddd; border-radius: 6px;
    background: #fff; color: #1a1a1a; text-align: center;
  }
  .val-display { font-size: 13px; font-weight: 600; min-width: 36px; }

  /* メインボタン */
  button {
    padding: 7px 18px; font-size: 13px; font-weight: 600;
    border-radius: 7px; border: 1.5px solid #1a1a1a;
    background: #1a1a1a; color: #fff; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; letter-spacing: 0.02em;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }
  button.secondary { background: #fff; color: #1a1a1a; border-color: #ccc; }
  button.secondary:hover { background: #f5f4f0; }
  button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  #status { font-size: 12px; color: #888; min-height: 16px; margin-bottom: 10px; padding-left: 2px; }

  /* プログレスバー */
  #progressWrap { display: none; margin-bottom: 12px; }
  #progressBar { height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
  #progressFill { height: 100%; width: 0%; background: #1a1a1a; transition: width 0.2s; border-radius: 2px; }
  #progressLabel { font-size: 11px; color: #aaa; margin-top: 4px; }

  /* ⑨ ページナビゲーションエリア */
  #pageNav {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }

  .nav-label { font-size: 12px; color: #777; white-space: nowrap; }

  /* ◀ ▶ ボタン */
  .nav-arrow {
    width: 34px; height: 34px;
    font-size: 16px; font-weight: 600;
    border-radius: 7px; border: 1.5px solid #ccc;
    background: #fff; color: #1a1a1a; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
    padding: 0;
  }
  .nav-arrow:hover:not(:disabled) { background: #f0f0f0; border-color: #999; }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ページ番号ボタン群 */
  #pageBtns {
    display: flex; flex-wrap: wrap; gap: 6px; flex: 1;
  }

  .page-btn {
    min-width: 34px; height: 34px;
    font-size: 12px; font-weight: 600;
    border-radius: 6px; border: 1.5px solid #ddd;
    background: #fff; color: #555; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    padding: 0 6px;
  }
  .page-btn:hover { background: #f5f4f0; border-color: #aaa; color: #1a1a1a; }
  .page-btn.active {
    background: #1a1a1a; color: #fff; border-color: #1a1a1a;
  }
  /* 差分あり → 枠を赤に */
  .page-btn.has-diff { border-color: #c0392b; color: #c0392b; }
  .page-btn.has-diff.active { background: #c0392b; color: #fff; border-color: #c0392b; }
  /* 差分なし → 通常グレー */
  .page-btn.no-diff { border-color: #ddd; color: #aaa; }
  .page-btn.no-diff.active { background: #555; color: #fff; border-color: #555; }

  .result-area { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .canvas-wrap { flex: 1; min-width: 260px; }
  .canvas-wrap-label { font-size: 11px; color: #999; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }

  #resultCanvas { width: 100%; display: block; border: 1px solid #e0e0e0; border-radius: 8px; background: #ffffff; }

  .sidebar { width: 170px; flex-shrink: 0; }
  .legend { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .legend-title { font-size: 11px; color: #999; margin-bottom: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .legend-swatch { width: 26px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .legend-text { font-size: 11px; color: #666; line-height: 1.4; }

  .stats-box { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px; display: none; }
  .stats-title { font-size: 11px; color: #999; margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
  .stats-value { font-size: 28px; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .stats-unit { font-size: 11px; color: #aaa; margin-top: 3px; }
  .stats-sub { font-size: 11px; color: #999; margin-top: 6px; }

  /* ページナビ凡例 */
  .nav-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; width: 100%; }
  .nav-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .nav-legend-dot {
    width: 12px; height: 12px; border-radius: 3px; border: 1.5px solid;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="container">

  <h1>PDF 比較ツール</h1>
  <p class="subtitle">2つのPDFを重ねて差分をカラー表示 — すべてブラウザ内で処理（サーバー送信なし）</p>

  <div class="upload-row">
    <div class="drop-zone" id="drop1" onclick="document.getElementById('file1').click()">
      <div class="drop-label-sub">比較元 PDF（青色で表示）</div>
      <div class="drop-label-main" id="label1">クリックまたはドロップ</div>
      <div class="drop-hint">旧バージョン</div>
      <input type="file" id="file1" accept=".pdf" style="display:none">
    </div>
    <div class="drop-zone" id="drop2" onclick="document.getElementById('file2').click()">
      <div class="drop-label-sub">比較先 PDF（赤色で表示）</div>
      <div class="drop-label-main" id="label2">クリックまたはドロップ</div>
      <div class="drop-hint">新バージョン</div>
      <input type="file" id="file2" accept=".pdf" style="display:none">
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">差分の不透明度</span>
      <input type="range" id="opacity" min="20" max="100" value="65" step="1">
      <span class="val-display" id="opacityVal">65%</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">白背景の閾値</span>
      <input type="range" id="bgThresh" min="180" max="254" value="230" step="1">
      <span class="val-display" id="bgThreshVal">230</span>
    </div>
    <button id="compareBtn" onclick="runCompareAll()" disabled>比較実行</button>
    <button id="downloadBtn" class="secondary" onclick="downloadAllPages()" style="display:none">📥 全ページPDF保存</button>
  </div>

  <div id="status">PDFを2つ選択してください</div>

  <div id="progressWrap">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressLabel"></div>
  </div>

  <!-- ⑨ ページナビゲーション -->
  <div id="pageNav">
    <span class="nav-label">ページ</span>
    <button class="nav-arrow" id="prevBtn" onclick="navigatePage(-1)" disabled>&#8249;</button>
    <div id="pageBtns"></div>
    <button class="nav-arrow" id="nextBtn" onclick="navigatePage(1)" disabled>&#8250;</button>
    <div class="nav-legend" style="border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 2px;">
      <div class="nav-legend-item">
        <div class="nav-legend-dot" style="background:#fff0f0; border-color:#c0392b;"></div>
        差分あり
      </div>
      <div class="nav-legend-item">
        <div class="nav-legend-dot" style="background:#f8f8f8; border-color:#ddd;"></div>
        差分なし
      </div>
    </div>
  </div>

  <div class="result-area">
    <div class="canvas-wrap">
      <div class="canvas-wrap-label" id="previewLabel">差分プレビュー</div>
      <canvas id="resultCanvas"></canvas>
    </div>
    <div class="sidebar">
      <div class="legend">
        <div class="legend-title">凡例</div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:rgba(25,85,210,0.65);"></div>
          <div class="legend-text">比較元のみ<br>（旧・削除）</div>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:rgba(210,35,35,0.65);"></div>
          <div class="legend-text">比較先のみ<br>（新・追加）</div>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#aaaaaa;"></div>
          <div class="legend-text">共通部分<br>（変更なし）</div>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#ffffff; border:1px solid #ddd;"></div>
          <div class="legend-text">背景（白）</div>
        </div>
      </div>
      <div class="stats-box" id="statsBox">
        <div class="stats-title">差分統計</div>
        <div class="stats-value" id="diffPercent">—</div>
        <div class="stats-unit">% 変更率</div>
        <div class="stats-sub" id="diffPixels"></div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdf1 = null, pdf2 = null, totalPages = 0;
let currentPage = 1;
// 全ページのキャッシュ: { canvas, diffCount, total }
let pageCache = {};

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function updateCompareBtn() { document.getElementById('compareBtn').disabled = !(pdf1 && pdf2); }

function setProgress(current, total, label) {
  const wrap = document.getElementById('progressWrap');
  if (current === null) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('progressFill').style.width = Math.round((current / total) * 100) + '%';
  document.getElementById('progressLabel').textContent = label || '';
}

async function loadPDF(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try { resolve(await pdfjsLib.getDocument({ data: e.target.result }).promise); }
      catch (err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

async function renderPage(pdf, pageNum, scale) {
  const page = await pdf.getPage(pageNum);
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(vp.width);
  canvas.height = Math.round(vp.height);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return canvas;
}

async function buildDiffCanvas(pageNum, scale, opacity, bgThresh) {
  const diffThresh = 20;
  const c1 = await renderPage(pdf1, pageNum, scale);
  const c2 = await renderPage(pdf2, pageNum, scale);
  const w = Math.max(c1.width, c2.width);
  const h = Math.max(c1.height, c2.height);

  const makeNorm = (src) => {
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    const tc = tmp.getContext('2d');
    tc.fillStyle = '#ffffff'; tc.fillRect(0, 0, w, h);
    tc.drawImage(src, 0, 0);
    return tc.getImageData(0, 0, w, h).data;
  };

  const d1 = makeNorm(c1);
  const d2 = makeNorm(c2);
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');
  const outImg = ctx.createImageData(w, h);
  const od = outImg.data;
  const alpha = Math.round(255 * opacity);
  let diffCount = 0;
  const total = w * h;

  for (let i = 0; i < total; i++) {
    const idx = i * 4;
    const r1=d1[idx], g1=d1[idx+1], b1=d1[idx+2];
    const r2=d2[idx], g2=d2[idx+1], b2=d2[idx+2];
    const lum1  = r1*0.299 + g1*0.587 + b1*0.114;
    const lum2  = r2*0.299 + g2*0.587 + b2*0.114;
    const isBg1 = (r1 >= bgThresh && g1 >= bgThresh && b1 >= bgThresh);
    const isBg2 = (r2 >= bgThresh && g2 >= bgThresh && b2 >= bgThresh);

    if (isBg1 && isBg2) {
      od[idx]=255; od[idx+1]=255; od[idx+2]=255; od[idx+3]=255;
      continue;
    }
    const diff = Math.abs(lum1 - lum2);
    if (diff > diffThresh) {
      diffCount++;
      if (!isBg1 && isBg2)      { od[idx]=25;  od[idx+1]=85;  od[idx+2]=210; od[idx+3]=alpha; }
      else if (isBg1 && !isBg2) { od[idx]=210; od[idx+1]=35;  od[idx+2]=35;  od[idx+3]=alpha; }
      else if (lum1 < lum2)     { od[idx]=25;  od[idx+1]=85;  od[idx+2]=210; od[idx+3]=alpha; }
      else                       { od[idx]=210; od[idx+1]=35;  od[idx+2]=35;  od[idx+3]=alpha; }
    } else {
      od[idx]=160; od[idx+1]=160; od[idx+2]=160; od[idx+3]=255;
    }
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  ctx.putImageData(outImg, 0, 0);
  return { canvas: out, diffCount, total };
}

async function handleFile(file, slot) {
  if (!file || file.type !== 'application/pdf') { setStatus('PDFファイルを選択してください'); return; }
  setStatus('PDF ' + slot + ' を読み込み中...');
  try {
    const pdf = await loadPDF(file);
    if (slot === 1) {
      pdf1 = pdf;
      document.getElementById('label1').textContent = file.name;
      document.getElementById('label1').className = 'drop-label-main blue';
      document.getElementById('drop1').className = 'drop-zone loaded-blue';
    } else {
      pdf2 = pdf;
      document.getElementById('label2').textContent = file.name;
      document.getElementById('label2').className = 'drop-label-main red';
      document.getElementById('drop2').className = 'drop-zone loaded-red';
    }
    updatePageInfo();
    updateCompareBtn();
    pageCache = {};
    document.getElementById('pageNav').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    setStatus('PDF ' + slot + ' 読み込み完了。' + (pdf1 && pdf2 ? '比較実行できます。' : 'もう一方のPDFを選択してください。'));
  } catch (err) { setStatus('エラー: ' + err.message); }
}

document.getElementById('file1').addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0], 1); });
document.getElementById('file2').addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0], 2); });

function setupDrop(zoneId, slot) {
  const zone = document.getElementById(zoneId);
  zone.addEventListener('dragover',  (e) => { e.preventDefault(); e.stopPropagation(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', (e) => { e.stopPropagation(); zone.classList.remove('dragover'); });
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0], slot);
  });
}
setupDrop('drop1', 1);
setupDrop('drop2', 2);

function updatePageInfo() {
  if (pdf1 && pdf2) {
    totalPages = Math.min(pdf1.numPages, pdf2.numPages);
  }
}

document.getElementById('opacity').addEventListener('input',  (e) => { document.getElementById('opacityVal').textContent  = e.target.value + '%'; });
document.getElementById('bgThresh').addEventListener('input', (e) => { document.getElementById('bgThreshVal').textContent = e.target.value; });

// ---- ⑨ ページナビゲーションを構築 ----
function buildPageNav() {
  const nav = document.getElementById('pageNav');
  const btns = document.getElementById('pageBtns');
  btns.innerHTML = '';

  for (let p = 1; p <= totalPages; p++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn';
    btn.textContent = p;
    btn.id = 'pgBtn_' + p;
    btn.onclick = () => jumpToPage(p);
    btns.appendChild(btn);
  }

  nav.style.display = 'flex';
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('prevBtn').disabled = (currentPage <= 1);
  document.getElementById('nextBtn').disabled = (currentPage >= totalPages);

  // 全ボタンのactiveを更新
  for (let p = 1; p <= totalPages; p++) {
    const btn = document.getElementById('pgBtn_' + p);
    if (!btn) continue;
    btn.classList.toggle('active', p === currentPage);
  }
}

// 差分あり／なしに応じてボタンの色を更新
function updatePageBtnStyle(pageNum, diffCount) {
  const btn = document.getElementById('pgBtn_' + pageNum);
  if (!btn) return;
  btn.classList.remove('has-diff', 'no-diff');
  btn.classList.add(diffCount > 0 ? 'has-diff' : 'no-diff');
}

function navigatePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  jumpToPage(next);
}

async function jumpToPage(pageNum) {
  currentPage = pageNum;
  updateNavButtons();
  await showPage(pageNum);
}

// 指定ページをプレビューに表示（キャッシュ優先）
async function showPage(pageNum) {
  setStatus(pageNum + ' ページ目を表示中...');
  const opacity  = parseInt(document.getElementById('opacity').value) / 100;
  const bgThresh = parseInt(document.getElementById('bgThresh').value);
  const deviceScale = window.devicePixelRatio || 1;
  const scale = 3.0 * deviceScale;

  try {
    let entry = pageCache[pageNum];
    if (!entry) {
      entry = await buildDiffCanvas(pageNum, scale, opacity, bgThresh);
      pageCache[pageNum] = entry;
      updatePageBtnStyle(pageNum, entry.diffCount);
    }

    const out = document.getElementById('resultCanvas');
    out.width  = entry.canvas.width;
    out.height = entry.canvas.height;
    const ctx = out.getContext('2d');
    ctx.drawImage(entry.canvas, 0, 0);

    const pct = ((entry.diffCount / entry.total) * 100).toFixed(2);
    document.getElementById('diffPercent').textContent = pct;
    document.getElementById('diffPixels').textContent  = entry.diffCount.toLocaleString() + ' px 差分';
    document.getElementById('statsBox').style.display  = 'block';
    document.getElementById('previewLabel').textContent = '差分プレビュー — ' + pageNum + ' / ' + totalPages + ' ページ';
    setStatus((entry.diffCount > 0 ? '差分あり' : '差分なし') + ' — ' + pageNum + ' / ' + totalPages + ' ページ目（変更率 ' + pct + '%）');
  } catch (err) { setStatus('エラー: ' + err.message); }
}

// ---- 比較実行：全ページをバックグラウンドで処理してナビを構築 ----
async function runCompareAll() {
  if (!pdf1 || !pdf2) { setStatus('PDFを2つ選択してください'); return; }

  pageCache = {};
  currentPage = 1;
  const opacity  = parseInt(document.getElementById('opacity').value) / 100;
  const bgThresh = parseInt(document.getElementById('bgThresh').value);
  const deviceScale = window.devicePixelRatio || 1;
  const scale = 3.0 * deviceScale;

  document.getElementById('compareBtn').disabled = true;
  document.getElementById('downloadBtn').style.display = 'none';

  // まず1ページ目をすぐ表示
  setStatus('1 / ' + totalPages + ' ページ目を処理中...');
  setProgress(0, totalPages, '1 / ' + totalPages + ' ページ処理中');

  try {
    const first = await buildDiffCanvas(1, scale, opacity, bgThresh);
    pageCache[1] = first;

    buildPageNav();
    updatePageBtnStyle(1, first.diffCount);

    const out = document.getElementById('resultCanvas');
    out.width  = first.canvas.width;
    out.height = first.canvas.height;
    out.getContext('2d').drawImage(first.canvas, 0, 0);

    const pct0 = ((first.diffCount / first.total) * 100).toFixed(2);
    document.getElementById('diffPercent').textContent = pct0;
    document.getElementById('diffPixels').textContent  = first.diffCount.toLocaleString() + ' px 差分';
    document.getElementById('statsBox').style.display  = 'block';
    document.getElementById('previewLabel').textContent = '差分プレビュー — 1 / ' + totalPages + ' ページ';
    updateNavButtons();

    // 残りページをバックグラウンドで順次処理
    for (let p = 2; p <= totalPages; p++) {
      setStatus(p + ' / ' + totalPages + ' ページ目を処理中...');
      setProgress(p - 1, totalPages, p + ' / ' + totalPages + ' ページ処理中');
      const entry = await buildDiffCanvas(p, scale, opacity, bgThresh);
      pageCache[p] = entry;
      updatePageBtnStyle(p, entry.diffCount);
      await new Promise(r => setTimeout(r, 0));
    }

    setProgress(null);
    document.getElementById('downloadBtn').style.display = 'inline-block';
    setStatus('全 ' + totalPages + ' ページの比較完了 — ページボタンで切り替えできます');
  } catch (err) {
    setStatus('エラー: ' + err.message);
    setProgress(null);
  } finally {
    document.getElementById('compareBtn').disabled = false;
  }
}

// ---- 全ページPDF出力 ----
async function downloadAllPages() {
  if (!pdf1 || !pdf2) return;

  const opacity  = parseInt(document.getElementById('opacity').value) / 100;
  const bgThresh = parseInt(document.getElementById('bgThresh').value);
  const scale    = 3.0;
  const DPI      = 72;
  const PX_TO_MM = 25.4 / DPI;

  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('compareBtn').disabled  = true;

  try {
    const { jsPDF } = window.jspdf;
    let doc = null;

    for (let p = 1; p <= totalPages; p++) {
      setStatus(p + ' / ' + totalPages + ' ページをPDF化中...');
      setProgress(p - 1, totalPages, p + ' / ' + totalPages + ' ページPDF化中');

      // キャッシュがあれば再利用（ただし出力用scaleは固定3.0で再生成）
      const entry = await buildDiffCanvas(p, scale, opacity, bgThresh);
      const wMm   = entry.canvas.width  * PX_TO_MM;
      const hMm   = entry.canvas.height * PX_TO_MM;
      const dataUrl = entry.canvas.toDataURL('image/png');

      if (p === 1) {
        doc = new jsPDF({
          orientation: wMm > hMm ? 'landscape' : 'portrait',
          unit: 'mm',
          format: [wMm, hMm],
          compress: false
        });
      } else {
        doc.addPage([wMm, hMm], wMm > hMm ? 'landscape' : 'portrait');
      }
      doc.addImage(dataUrl, 'PNG', 0, 0, wMm, hMm, undefined, 'NONE');
      await new Promise(r => setTimeout(r, 0));
    }

    setProgress(totalPages, totalPages, '完了');
    doc.save('pdf_diff_all_' + new Date().toISOString().slice(0, 10) + '.pdf');
    setStatus('全 ' + totalPages + ' ページのダウンロード完了');
    setTimeout(() => setProgress(null), 1500);
  } catch (err) {
    setStatus('エラー: ' + err.message);
    setProgress(null);
  } finally {
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('compareBtn').disabled  = false;
  }
}
</script>
