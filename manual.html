    <script>
    (function() {
        const CATALOG_URL = 'https://28yu.github.io/Revit-Add-ins/features.json';
        const params = new URLSearchParams(location.search);
        const featureId = params.get('id');
        const contentEl = document.getElementById('manual-content');

        async function loadManual() {
            if (!featureId) {
                contentEl.innerHTML = '<p>機能IDが指定されていません。<a href="features.html">機能一覧に戻る</a></p>';
                return;
            }

            let catalog;
            try {
                const res = await fetch(CATALOG_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                catalog = await res.json();
            } catch (e) {
                contentEl.innerHTML = '<p>機能データの取得に失敗しました。しばらくしてからページを再読み込みしてください。</p>';
                return;
            }

            const feature = catalog.features.find(f => f.id === featureId);
            if (!feature) {
                contentEl.innerHTML = `<p>機能「${featureId}」が見つかりません。<a href="features.html">機能一覧に戻る</a></p>`;
                return;
            }

            // パンくずとタイトル更新
            const lang = window.currentLanguage || localStorage.getItem('lang') || 'ja';
            const name = feature.names[lang] || feature.names['ja'];
            document.title = `${feature.names['ja']} - 28 Tools`;
            const breadcrumb = document.getElementById('breadcrumb-feature-name');
            if (breadcrumb) breadcrumb.textContent = name;

            // canonical タグを動的に設定
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
                canonical = document.createElement('link');
                canonical.rel = 'canonical';
                document.head.appendChild(canonical);
            }
            canonical.href = `https://28tools.com/manual.html?id=${featureId}`;

            // Markdown 取得・レンダリング
            const mdUrl = `${catalog.baseUrl}/${feature.manual}`;
            try {
                const mdRes = await fetch(mdUrl);
                if (!mdRes.ok) throw new Error(`HTTP ${mdRes.status}`);
                const md = await mdRes.text();
                contentEl.innerHTML = marked.parse(md);
            } catch (e) {
                contentEl.innerHTML = `<p>マニュアルの取得に失敗しました（<code>${mdUrl}</code>）。</p>`;
            }
        }

        loadManual();
    })();
    </script>
